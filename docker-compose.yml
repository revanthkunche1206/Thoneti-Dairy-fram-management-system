version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=Thoneti
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=your_production_secure_password
    ports:
      - "5433:5432"

  web:
    build: .
    command: gunicorn SE_project.wsgi:application --bind 0.0.0.0:8000 --workers 3
    ports:
      - "8001:8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=django-insecure-your-secret-key-here
      - ALLOWED_HOSTS=127.0.0.1,localhost
      - DB_NAME=Thoneti
      - DB_USER=postgres
      - DB_PASSWORD=your_production_secure_password
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db

volumes:
  postgres_data:
